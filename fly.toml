# Fly.io Application Configuration
app = "sylvi-bot"
primary_region = "sin"  # Singapore — closest free region to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "7860"

# Persistent Volume Mount — this is where SQLite lives permanently
[mounts]
  source = "sylvi_data"
  destination = "/data"

# HTTP Service — exposes the health check server
[[services]]
  internal_port = 7860
  protocol = "tcp"

  [[services.tcp_checks]]
    grace_period = "30s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

  [[services.http_checks]]
    grace_period = "30s"
    interval = "15s"
    method = "get"
    path = "/health"
    timeout = "5s"

# Allocate minimal VM resources (free tier)
[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
